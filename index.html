<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OKNT – Minigra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #050509;
            color: #f5f5f5;
            font-family: system-ui, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            letter-spacing: 0.15em;
        }

        #game-area {
            width: 100%;
            height: 500px;
            position: relative;
            margin-top: 40px;
            border-top: 1px solid #1b1b25;
        }

        .target {
            width: 60px;
            height: 60px;
            background: #6b5bff;
            border-radius: 8px;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(107, 91, 255, 0.7);
            transition: transform 0.1s ease;
        }

        .target:active {
            transform: scale(0.9);
        }

        #score {
            margin-top: 20px;
            font-size: 1.4rem;
            color: #6b5bff;
        }

        #start-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #6b5bff;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(107, 91, 255, 0.7);
        }

        #start-btn:hover {
            background: #7d6dff;
        }
    </style>
</head>
<body>

    <h1>OKNT – Minigierka</h1>
    <p>Klikaj w pojawiający się kwadrat zanim zniknie.</p>

    <div id="score">Wynik: 0</div>
    <button id="start-btn">Start</button>

    <div id="game-area"></div>

    <script>
        const gameArea = document.getElementById("game-area");
        const scoreDisplay = document.getElementById("score");
        const startBtn = document.getElementById("start-btn");

        let score = 0;
        let active = false;

        function spawnTarget() {
            if (!active) return;

            const target = document.createElement("div");
            target.classList.add("target");

            const maxX = gameArea.clientWidth - 60;
            const maxY = gameArea.clientHeight - 60;

            target.style.left = Math.random() * maxX + "px";
            target.style.top = Math.random() * maxY + "px";

            target.onclick = () => {
                score++;
                scoreDisplay.textContent = "Wynik: " + score;
                target.remove();
            };

            gameArea.appendChild(target);

            setTimeout(() => {
                if (target.parentNode) target.remove();
            }, 900);

            setTimeout(spawnTarget, 1000);
        }

        startBtn.onclick = () => {
            score = 0;
            scoreDisplay.textContent = "Wynik: 0";
            active = true;
            spawnTarget();
        };
    </script>

</body>
</html>
