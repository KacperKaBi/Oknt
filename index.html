<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKNT</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0a0a0a, #000000);
            color: white;
            overflow-x: hidden;
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            -webkit-background-clip: text;
            color: transparent;
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00eaff; }
            to { text-shadow: 0 0 25px #0077ff; }
        }

        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #0077ff, #00eaff);
            color: black;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px #00eaff;
        }

        /* SEKCJA SKLEP */
        .section {
            padding: 80px 20px;
            text-align: center;
        }

        .section h2 {
            font-size: 50px;
            margin-bottom: 40px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .item:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px #0077ff;
        }

        .item img {
            width: 100%;
            border-radius: 15px;
        }

        .item h3 {
            margin-top: 15px;
            font-size: 22px;
        }

        /* O NAS */
        .about {
            max-width: 800px;
            margin: auto;
            font-size: 20px;
            line-height: 1.6;
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="logo">OKNT</div>
        <button class="btn" onclick="window.location.href='https://discord.gg/GPSdb5xfQS'">
            Dołącz na Discord
        </button>
    </div>

    <div class="section">
        <h2>Sklep</h2>
        <div class="shop-grid">
            <div class="item">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Produkt 1</h3>
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Produkt 2</h3>
            </div>
            <div class="item">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Produkt 3</h3>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>O nas</h2>
        <p class="about">
            OKNT t kurwa zajebiste miejsce.  
            Mottem jest dupa sranie. 67 skibidi .  
            Strona będzie rozwijana — to dopiero początek.
        </p>
    </div>

    <footer>
        © 2026 OKNT Studio — All rights reserved.
    </footer>

</body>
</html>
