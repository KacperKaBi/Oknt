<style>
/* -----------------------------------------------------------
   GLOBAL STYLE — FULL OKN'T AESTHETIC
----------------------------------------------------------- */

:root {
    --black: #0a0a0a;
    --gray: #1a1a1a;
    --lightgray: #2a2a2a;
    --white: #f2f2f2;
    --accent: #888;
    --gradient1: linear-gradient(135deg, #000, #222, #111);
    --gradient2: linear-gradient(135deg, #111, #333, #000);
    --glass: rgba(255,255,255,0.05);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: var(--gradient1);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: var(--white);
}

/* -----------------------------------------------------------
   BACKGROUND EFFECTS — GRADIENT WAVES, GLOW, PARTICLES
----------------------------------------------------------- */

.bg-glow {
    position: absolute;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    filter: blur(120px);
    animation: glowMove 12s infinite alternate ease-in-out;
}

@keyframes glowMove {
    0% { transform: translate(-200px, -200px); }
    100% { transform: translate(200px, 200px); }
}

.particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.particles span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    opacity: 0.15;
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 0.1; }
    50% { transform: translateY(-40px); opacity: 0.3; }
    100% { transform: translateY(0); opacity: 0.1; }
}

/* -----------------------------------------------------------
   MAIN LOGIN BOX — GLASS + GRADIENT + SHADOW
----------------------------------------------------------- */

.box {
    width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeIn 1.2s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* -----------------------------------------------------------
   LOGO
----------------------------------------------------------- */


.logo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 20px auto;
    display: block;
object-fit: cover;
       box-shadow: 0 0 25px rgba(255,255,255,0.2);
    animation: logoFloat 4s infinite ease-in-out;
}


@keyframes logoFloat {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}


/* -----------------------------------------------------------
   INPUTS
----------------------------------------------------------- */

input {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: var(--lightgray);
    color: var(--white);
    font-size: 15px;
    outline: none;
    transition: 0.2s;
}

input:focus {
    background: #333;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

/* -----------------------------------------------------------
   BUTTON
----------------------------------------------------------- */

button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border-radius: 10px;
    border: none;
    background: var(--gradient2);
    color: var(--white);
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s;
    letter-spacing: 1px;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

/* -----------------------------------------------------------
   SWITCH MODE
----------------------------------------------------------- */

.switch {
    text-align: center;
    margin-top: 20px;
    cursor: pointer;
    color: #aaa;
    transition: 0.2s;
}

.switch:hover {
    color: white;
}

/* -----------------------------------------------------------
   TITLE
----------------------------------------------------------- */

h2 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 28px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.subtitle {
    text-align: center;
    margin-bottom: 20px;
    font-size: 14px;
    opacity: 0.7;
}

/* -----------------------------------------------------------
   REALISTYCZNE NOCNE NIEBO — MIGAJĄCE GWIAZDY
----------------------------------------------------------- */

.stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.2;
    animation-name: blink;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
}

@keyframes blink {
    0%   { opacity: 0.1; }
    40%  { opacity: 1; }
    100% { opacity: 0.1; }
}

/* BOX NAD GWIAZDAMI */
.box {
    position: relative;
    z-index: 10;
}

</style>

<!-- MAIN LOGIN BOX -->
<div class="box">

    <a href="https://discord.gg/yHaSSbfbMu" target="_blank">
    <img src="logo.png" class="logo">
</a>


    <h2>Okn't Studio</h2>
    <div class="subtitle">Panel logowania</div>

    <input id="user" type="text" placeholder="Login">
    <input id="pass" type="password" placeholder="Hasło">

    <button onclick="submitForm()">Zatwierdź</button>

    <div class="switch" onclick="toggleMode()">Nie masz konta? Zarejestruj się</div>
</div>

<script>
let mode = "login";

function toggleMode() {
    mode = mode === "login" ? "register" : "login";
    document.querySelector("h2").innerText =
        mode === "login" ? "Okn't Studio" : "Okn't Studio";
    document.querySelector(".subtitle").innerText =
        mode === "login" ? "Panel logowania" : "Utwórz nowe konto";
    document.querySelector(".switch").innerText =
        mode === "login" ? "Nie masz konta? Zarejestruj się" : "Masz konto? Zaloguj się";
}

async function submitForm() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    const endpoint = mode === "login" ? "/login" : "/register";

    const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!data.ok) {
        alert(data.msg || "Błąd");
        return;
    }

    if (mode === "login") {
        window.location.href = "success.html";
    } else {
        alert("Zarejestrowano! Możesz się zalogować.");
        toggleMode();
    }
}
</script>
